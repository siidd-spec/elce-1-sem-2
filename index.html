<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Profile Dashboard</h1>

        <div class="card-container">

            <div class="card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Student">
                <div class="info">
                    <p><strong>Name:</strong> Rahul Sharma</p>
                    <p><strong>Course:</strong> CSE</p>
                    <p><strong>Year:</strong> 3rd Year</p>
                    <p><strong>CGPA:</strong> 8.5</p>
                </div>
            </div>

            <div class="card">
                <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Student">
                <div class="info">
                    <p><strong>Name:</strong> Priya Singh</p>
                    <p><strong>Course:</strong> BCA</p>
                    <p><strong>Year:</strong> 2nd Year</p>
                    <p><strong>CGPA:</strong> 9.1</p>
                </div>
            </div>

        </div>

        <button onclick="showTopper()">Show Topper</button>
        <p id="result"></p>

    </div>

    <script src="script.js"></script>
</body>
</html>
