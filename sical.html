<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 320px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Interest Calculator</h2>

    <label>Principal Amount:</label>
    <input type="number" id="principal" placeholder="Enter principal" oninput="calculateSI()">

    <label>Rate of Interest (%):</label>
    <input type="number" id="rate" placeholder="Enter rate" oninput="calculateSI()">

    <label>Time (Years):</label>
    <input type="number" id="time" placeholder="Enter time" oninput="calculateSI()">

    <div class="result" id="result">
        Simple Interest: ₹0
    </div>
</div>

<script>
    function calculateSI() {
        let principal = parseFloat(document.getElementById("principal").value) || 0;
        let rate = parseFloat(document.getElementById("rate").value) || 0;
        let time = parseFloat(document.getElementById("time").value) || 0;

        let simpleInterest = (principal * rate * time) / 100;

        document.getElementById("result").innerHTML =
            "Simple Interest: ₹" + simpleInterest.toFixed(2);
    }
</script>

</body>
</html>
